name: CI

on:
  push:
    branches: [main, release/*]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax:
    name: Syntax Check
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run syntax check
        shell: pwsh
        run: |
          # PowerShell 7 is the standard on windows-latest. We test the
          # same set of files Invoke-SyntaxCheck.ps1 walks.
          ./build/Invoke-SyntaxCheck.ps1

  lint:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Run lint
        shell: pwsh
        run: |
          $settings = '.PSScriptAnalyzerSettings.psd1'
          $params = @{ Severity = @('Error', 'Warning') }
          if (Test-Path $settings) { $params.Settings = $settings }
          $files = Get-ChildItem -Path . -Include '*.ps1', '*.psm1', '*.psd1' -Recurse -File |
            Where-Object { $_.FullName -notmatch '[\\/](\.git|node_modules|bin|obj|dist|\.planning-archive-reverted-c#-era)[\\/]' }
          $errors = 0
          $warnings = 0
          foreach ($f in $files) {
            $r = Invoke-ScriptAnalyzer -Path $f.FullName @params -ErrorAction SilentlyContinue
            if ($r) {
              $errors += ($r | Where-Object Severity -eq 'Error').Count
              $warnings += ($r | Where-Object Severity -eq 'Warning').Count
              foreach ($issue in $r) {
                $color = if ($issue.Severity -eq 'Error') { 'red' } else { 'yellow' }
                Write-Host "  $($f.Name):$($issue.Line) [$($issue.RuleName)] $($issue.Message)" -ForegroundColor $color
              }
            }
          }
          Write-Host ""
          Write-Host "Lint: $errors errors, $warnings warnings"
          if ($errors -gt 0) { exit 1 }

  unit-tests:
    name: Pester Unit Tests
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module Pester -MinimumVersion 5.0 -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Run unit tests
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path TestResults -Force | Out-Null
          $config = New-PesterConfiguration
          $config.Run.Path = './Tests'
          # Skip tests that need a real WSUS stack or interactive desktop
          $config.Filter.ExcludeTag = @('E2E', 'GUI', 'Integration', 'FlaUI')
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'TestResults/unit-tests.xml'
          $config.TestResult.OutputFormat = 'NUnit3'
          $r = Invoke-Pester -Configuration $config
          if ($r.FailedCount -gt 0) { exit 1 }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: TestResults/
          retention-days: 14


  build:
    name: Build EXE
    needs: [syntax, lint, unit-tests]
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester and PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module Pester -MinimumVersion 5.0 -Force -SkipPublisherCheck -Scope CurrentUser
          Install-Module PSScriptAnalyzer -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Build EXE
        shell: pwsh
        run: |
          .\build.ps1 -SkipCodeReview -SkipTests -NoPush

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wsusmanager-${{ github.sha }}
          path: |
            dist/GA-WsusManager.exe
            dist/WsusManager-v*.zip
          retention-days: 14
