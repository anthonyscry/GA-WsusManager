name: GUI Tests (triton-ajt)

on:
  workflow_dispatch:
    inputs:
      run_unit_tests:
        description: 'Also run Pester unit tests'
        required: false
        type: boolean
        default: true
      run_gui_tests:
        description: 'Run FlaUI GUI automation tests'
        required: false
        type: boolean
        default: true
  schedule:
    # Run daily at 6 AM Pacific (14:00 UTC), weekdays only
    - cron: '0 14 * * 1-5'

jobs:
  gui-tests:
    name: GUI Automation Tests
    runs-on: [self-hosted, windows, triton-ajt]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Pester Unit Tests
        if: ${{ github.event.inputs.run_unit_tests != 'false' }}
        shell: powershell
        run: |
          Write-Host "Running Pester unit tests..."
          New-Item -ItemType Directory -Path TestResults -Force | Out-Null
          Invoke-Pester -Path .\Tests -Output Detailed -ExcludeTag 'E2E','Navigation','Settings','About','History','Help','Performance','Resilience','Cleanup' -PassThru | Export-JUnit -Path .\TestResults\UnitTests.xml
        continue-on-error: true

      - name: Build EXE
        shell: powershell
        run: |
          Write-Host "Building EXE..."
          .\build.ps1 -SkipTests -SkipCodeReview

      # GUI tests require an interactive desktop session.
      # The self-hosted runner may not have one if running as a service.
      # Run-GuiTests.ps1 creates a scheduled task to run tests in the
      # interactive console session (Session 1) where UI Automation works.
      - name: Run FlaUI GUI Tests (via Interactive Session)
        if: ${{ github.event.inputs.run_gui_tests != 'false' }}
        shell: powershell
        run: |
          Write-Host "Running GUI tests via scheduled task..."
          .\Tests\Run-GuiTests.ps1 -ResultsPath ".\Tests\flaui-test-results.txt" -TimeoutSeconds 300
        continue-on-error: true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: |
            TestResults/
            Tests/flaui-test-results.txt
          retention-days: 14

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.sha }}
          path: Tests/Screenshots/
          retention-days: 7
          if-no-files-found: ignore
